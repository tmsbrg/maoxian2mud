<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MaoXianMUD</title>

<style>
html {
    height: 100%;
    overflow: hidden;
}

body {
    background: black;
    color: #00ff00;
    font-family: monospace;
    margin: 0;
    display: flex;
    flex-direction: column;
    height: 100%;
    height: 100dvh;
    overflow: hidden;
}

#output {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 10px;
    padding-top: max(10px, env(safe-area-inset-top));
    white-space: pre-wrap;
    word-break: break-word;
}

#input-bar {
    flex-shrink: 0;
    padding: 8px;
    padding-bottom: max(8px, env(safe-area-inset-bottom));
}

#input {
    display: block;
    box-sizing: border-box;
    background: black;
    color: #00ff00;
    border: 2px solid #00aa00;
    border-radius: 4px;
    width: 100%;
    margin: 0;
    padding: 12px 10px;
    font-family: monospace;
    font-size: 16px;
    outline: none;
}

#input:focus {
    border-color: #00ff00;
    box-shadow: 0 0 0 1px #00ff00;
}

#input::placeholder {
    color: #008800;
}
</style>
</head>

<body>

<div id="output"></div>

<div id="input-bar">
<input
    id="input"
    autocomplete="off"
    placeholder="Type command and press Enter"
/>
</div>

<script>
const output = document.getElementById("output");
const input = document.getElementById("input");

const ws = new WebSocket(
    `${location.protocol === "https:" ? "wss" : "ws"}://${location.host}/ws`
);

function print(text) {
    output.textContent += text + "\n";
    output.scrollTop = output.scrollHeight;
}

ws.onmessage = (event) => {
    print(event.data);
};

input.addEventListener("keydown", (e) => {

    if (e.key !== "Enter") {
        return;
    }

    const cmd = input.value;

    print("> " + cmd);

    ws.send(cmd);

    input.value = "";
});
</script>

</body>
</html>
