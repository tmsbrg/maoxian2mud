<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MaoXianMUD</title>

<style>
html {
    height: 100%;
    overflow: hidden;
}

body {
    background: black;
    color: #00ff00;
    font-family: monospace;
    margin: 0;
    display: flex;
    flex-direction: column;
    height: 100%;
    height: 100dvh;
    overflow: hidden;
}

#output {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 10px;
    padding-top: max(10px, env(safe-area-inset-top));
    white-space: pre-wrap;
    word-break: break-word;
}

#input-bar {
    flex-shrink: 0;
    padding: 8px;
    padding-bottom: max(8px, env(safe-area-inset-bottom));
}

#input-row {
    display: flex;
    align-items: center;
    gap: 8px;
}

#cooldown {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    opacity: 0;
    transition: opacity 0.15s;
}

#cooldown.active {
    opacity: 1;
}

#cooldown svg {
    display: block;
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
}

#cooldown-bg {
    fill: none;
    stroke: #004400;
    stroke-width: 3;
}

#cooldown-fg {
    fill: none;
    stroke: #00ff00;
    stroke-width: 3;
    stroke-linecap: round;
    stroke-dasharray: 100.53;
    stroke-dashoffset: 0;
}

#input {
    flex: 1;
    min-width: 0;
    box-sizing: border-box;
    background: black;
    color: #00ff00;
    border: 2px solid #00aa00;
    border-radius: 4px;
    margin: 0;
    padding: 12px 10px;
    font-family: monospace;
    font-size: 16px;
    outline: none;
}

#input:focus {
    border-color: #00ff00;
    box-shadow: 0 0 0 1px #00ff00;
}

#input::placeholder {
    color: #008800;
}
</style>
</head>

<body>

<div id="output"></div>

<div id="input-bar">
<div id="input-row">
<div id="cooldown" aria-hidden="true">
<svg viewBox="0 0 36 36">
<circle id="cooldown-bg" cx="18" cy="18" r="16"/>
<circle id="cooldown-fg" cx="18" cy="18" r="16"/>
</svg>
</div>
<input
    id="input"
    autocomplete="off"
    placeholder="Type command and press Enter"
/>
</div>
</div>

<script>
const output = document.getElementById("output");
const input = document.getElementById("input");
const cooldown = document.getElementById("cooldown");
const cooldownFg = document.getElementById("cooldown-fg");

const COOLDOWN_MS = 5000;
const RING_LENGTH = 100.53;
let cooldownEnd = 0;
let cooldownFrame = null;

const name = new URLSearchParams(location.search).get("name");
const wsQuery = name ? `?name=${encodeURIComponent(name)}` : "";
const ws = new WebSocket(
    `${location.protocol === "https:" ? "wss" : "ws"}://${location.host}/ws${wsQuery}`
);

function print(text) {
    output.textContent += text + "\n";
    output.scrollTop = output.scrollHeight;
}

function startCooldown(ms) {
    cooldownEnd = Date.now() + ms;
    cooldown.classList.add("active");
    updateCooldownRing();
}

function updateCooldownRing() {
    const remaining = cooldownEnd - Date.now();

    if (remaining <= 0) {
        cooldownEnd = 0;
        cooldown.classList.remove("active");
        cooldownFg.style.strokeDashoffset = "0";
        cooldownFrame = null;
        return;
    }

    const progress = remaining / COOLDOWN_MS;
    cooldownFg.style.strokeDashoffset = String(RING_LENGTH * (1 - progress));
    cooldownFrame = requestAnimationFrame(updateCooldownRing);
}

ws.onmessage = (event) => {
    const data = event.data;

    if (data.startsWith("@@cooldown:")) {
        const ms = Number(data.slice("@@cooldown:".length));
        if (ms > 0) {
            if (cooldownFrame) {
                cancelAnimationFrame(cooldownFrame);
            }
            startCooldown(ms);
        }
        return;
    }

    print(data);
};

function isInfoCommand(cmd) {
    const verb = cmd.split(/\s+/)[0].toLowerCase();
    return verb === "help" || verb === "look" || verb === "inv" || verb === "examine" || verb === "x";
}

input.addEventListener("keydown", (e) => {

    if (e.key !== "Enter") {
        return;
    }

    const cmd = input.value.trim();
    if (!cmd) {
        return;
    }

    if (Date.now() < cooldownEnd && !isInfoCommand(cmd)) {
        return;
    }

    print("> " + cmd);

    ws.send(cmd);

    input.value = "";
});
</script>

</body>
</html>
